<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>展陈规划方案 · 可编辑</title>
<style>
:root{
  --ink:#2b2b2b; --sub:#7a7a7a; --line:#1f3a5f; --paper:#f7f6f2;
  --primary:#D7263D; --secondary:#5B8DEF; --evac:#2E7D32;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB","Helvetica Neue",Arial,sans-serif;
     background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
.app{display:flex;min-height:100vh;}
.main{flex:1;padding:24px 28px 60px;max-width:1180px;margin:0 auto;}
.sheet{background:#fff;border:1px solid #e6e4dd;box-shadow:0 8px 40px rgba(0,0,0,.06);
       padding:28px 32px 34px;margin-bottom:24px;}
.titleblock{display:flex;align-items:flex-start;gap:14px;}
.corner{position:relative;padding:6px 4px 6px 0;}
.corner:before{content:"";position:absolute;left:0;top:0;width:40px;height:2px;background:var(--line);}
.corner:after{content:"";position:absolute;left:0;top:0;width:2px;height:40px;background:var(--line);}
.zh-title{font-size:28px;font-weight:800;letter-spacing:5px;color:var(--line);padding-left:14px;line-height:1.1;}
.en-title{font-size:11px;letter-spacing:3px;color:var(--sub);padding-left:15px;text-transform:uppercase;margin-top:3px;}
.sheet-tag{margin-left:auto;text-align:right;}
.sheet-tag .big{font-size:13px;font-weight:700;color:var(--line);letter-spacing:2px;}
.sheet-tag .small{font-size:10px;color:var(--sub);letter-spacing:2px;}
.divider{height:2px;background:linear-gradient(90deg,var(--line),transparent);margin:14px 0 18px;}
.note{font-size:12.5px;color:var(--sub);margin-top:16px;border-top:1px dashed #ddd;padding-top:12px;}
.note b{color:var(--ink);}
.stage{border:1px solid #ececec;border-radius:6px;overflow:hidden;background:#fcfcfb;position:relative;}
svg{display:block;width:100%;height:auto;}
.legendbar{display:flex;flex-wrap:wrap;gap:12px 20px;margin-top:14px;padding:12px 14px;
           background:#fafafa;border:1px solid #eee;border-radius:6px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px;}
.swatch{width:20px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.15);flex:none;}
.lineswatch{width:30px;height:0;flex:none;}
[contenteditable]{outline:none;border-radius:3px;transition:background .12s;cursor:text;}
[contenteditable]:hover{background:#fff7d6;}
[contenteditable]:focus{background:#fff2bf;box-shadow:0 0 0 2px #ffd64a;}

/* 书签页 */
.rail{width:188px;flex:none;background:#fff;border-left:1px solid #e6e4dd;
      position:sticky;top:0;align-self:flex-start;height:100vh;padding:22px 0;overflow-y:auto;}
.rail h4{font-size:11px;letter-spacing:2px;color:var(--sub);padding:0 18px 10px;text-transform:uppercase;}
.bm{display:block;position:relative;padding:11px 16px 11px 22px;text-decoration:none;color:#555;
    font-size:13.5px;border-left:4px solid transparent;cursor:pointer;}
.bm:hover{background:#f6f5f1;}
.bm.active{background:#f0f4f9;border-left-color:var(--line);color:var(--line);font-weight:700;}
.bm .ch{font-size:10px;color:#aaa;display:block;letter-spacing:1px;}
.bm.active .ch{color:var(--line);}
.bm .dot{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:#ccc;}

/* 顶部工具条 */
.toolbar{position:sticky;top:0;z-index:30;background:#fffffff2;backdrop-filter:blur(6px);
         border-bottom:1px solid #e6e4dd;padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn{font-size:13px;padding:7px 13px;border:1px solid #d6d3ca;background:#fff;border-radius:6px;cursor:pointer;color:#333;}
.btn:hover{border-color:var(--line);color:var(--line);}
.btn.primary{background:var(--line);color:#fff;border-color:var(--line);}
.btn.warn{color:var(--primary);border-color:#f0c2c7;}
.hint{font-size:12px;color:var(--sub);margin-left:auto;}
.modebar{display:none;gap:8px;align-items:center;font-size:12.5px;color:#555;
         background:#fff8e6;border:1px solid #ffe08a;border-radius:6px;padding:6px 12px;margin:0 0 12px;}
.modebar.on{display:flex;}
.pill{font-size:11px;background:#fff;border:1px solid #ddd;border-radius:20px;padding:3px 10px;cursor:pointer;}
.pill.sel{background:var(--line);color:#fff;border-color:var(--line);}

/* SVG 编辑锚点 */
.vtx{cursor:grab;}
.vtx:active{cursor:grabbing;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px;margin-top:8px;}
.zcard{background:#fff;border:1px solid #ececec;border-radius:8px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.03);}
.zhead{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.zid{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex:none;}
.zname{font-size:16px;font-weight:700;}
.zen{font-size:10px;color:#999;letter-spacing:1px;text-transform:uppercase;}
.emo{margin-left:auto;font-size:11px;color:#fff;background:var(--primary);padding:2px 8px;border-radius:10px;}
.zcard ul{list-style:none;}
.zcard li{font-size:13px;color:#444;padding:3px 0 3px 14px;position:relative;border-bottom:1px dashed #f0f0f0;}
.zcard li:before{content:"";position:absolute;left:0;top:10px;width:6px;height:6px;border-radius:50%;background:#ccc;}
.zcard li:last-child{border-bottom:none;}
.subhead{font-size:13px;font-weight:700;color:var(--line);letter-spacing:1px;margin:18px 0 8px;}
@media print{.rail,.toolbar,.modebar{display:none!important;} .main{max-width:none;}}
/* 目录页卡片 */
.toc{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;}
.toccard{display:block;text-decoration:none;color:inherit;border:1px solid #e6e4dd;border-radius:10px;
         padding:26px 22px 30px;cursor:pointer;transition:.15s;background:#fff;}
.toccard:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(0,0,0,.08);border-color:var(--line);}
.toccard .tn{font-size:40px;font-weight:800;color:#c9cdd6;line-height:1;}
.toccard .tt{font-size:18px;font-weight:700;margin-top:14px;color:#2b2b2b;}
/* 情绪节点编辑列表 */
.emolist{margin-top:8px;}
.emorow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px dashed #eee;font-size:13.5px;}
.emorow .enum{width:22px;height:22px;border-radius:50%;background:var(--line);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none;}
.emorow .elbl{color:#999;font-size:12px;margin-left:6px;}
.emorow [contenteditable]{min-width:60px;border-bottom:1px solid #e0ddd4;padding:1px 6px;}
.iorow{display:flex;align-items:center;gap:6px;margin-top:12px;padding:10px 14px;background:#fafafa;border:1px solid #eee;border-radius:6px;font-size:13.5px;}
.iorow .iolbl{width:22px;height:22px;border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.iorow [contenteditable]{border-bottom:1px solid #e0ddd4;padding:1px 6px;min-width:50px;}
</style></head>
<body>
<div class="toolbar" id="toolbar">
  <span id="ctxBtns"></span>
  <span style="width:1px;height:20px;background:#ddd"></span>
  <button class="btn primary" id="btnSaveState">💾 保存</button>
  <button class="btn" id="btnExport">⬇ 导出JSON</button>
  <button class="btn" id="btnSaveHtml">📄 另存HTML</button>
  <button class="btn" id="btnPrint">🖨 打印/PDF</button>
  <span class="hint" id="hint">文字双击即可改 · 保存后下次打开自动恢复</span>
</div>

<div class="app">
  <div class="main" id="main"></div>
  <nav class="rail" id="rail"><h4>章节书签 / Chapters</h4></nav>
</div>

    a.innerHTML=`<span class="dot"></span><span class="ch">${label}</span>${s.t}`;
    a.onclick=()=>document.getElementById('sheet-'+s.key).scrollIntoView({behavior:'smooth',block:'start'});
    rail.appendChild(a);
  });
  const zwrap=document.createElement('div'); zwrap.style.cssText='margin-top:14px;border-top:1px dashed #eee;padding-top:10px;';
  zwrap.innerHTML='<h4>展区目录 / Zones</h4>';
  (DATA.zones||[]).forEach(z=>{

    a.innerHTML=`<span class="dot" style="background:${z.color||'#ccc'}"></span>${esc(z.id)} ${esc(z.name)}`;
    a.onclick=()=>{document.getElementById('sheet-plan').scrollIntoView({behavior:'smooth'}); selZone=z.id; curPage='plan'; if(!editMode){editMode=true;} renderAll();};
    zwrap.appendChild(a);
  });
  rail.appendChild(zwrap);
}
let _io=null;
function spyScroll(){
  const opts={root:null,rootMargin:'-30% 0px -60% 0px',threshold:0};
  if(_io){ _io.disconnect(); }
  _io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){
    const k=e.target.id.replace('sheet-','');
    document.querySelectorAll('.rail .bm').forEach(b=>b.classList.toggle('active', b.dataset.key===k));
    if(curPage!==k){ curPage=k; if(k!=='plan'){selZone=null;} renderToolbar(); }
  }})},opts);
  SHEETS.forEach(s=>{const el=document.getElementById('sheet-'+s.key); if(el) _io.observe(el);});
}

/* ---------- 通用：可编辑文本绑定 ---------- */
function ce(val, path, tag='span', cls=''){
  // path 形如 ['title'] 或 ['zones',2,'name'] 或 ['zones',2,'items',1]
  return `<${tag} class="${cls}" contenteditable spellcheck="false" data-path='${JSON.stringify(path)}'>${esc(val)}</${tag}>`;
}
function bindEditable(root){
  root.querySelectorAll('[contenteditable]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const p=JSON.parse(el.dataset.path); let o=DATA;
      for(let i=0;i<p.length-1;i++) o=o[p[i]];
      const val=el.innerText.trim();
      const changed=(o[p[p.length-1]]!==val);
      o[p[p.length-1]]=val;
      // 任意文字变化即整页重绘 —— 同名/镜像内容（如各页“序厅·入境”）全局同步
      if(changed){ renderAll(); }
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&el.tagName!=='DIV'){e.preventDefault();el.blur();}});
  });
}

/* ---------- 图二：动线图 ---------- */
function smooth(points){
  if(points.length<2) return '';
  const P=points.map(p=>[X(p[0]),Y(p[1])]);
  if(P.length===2) return `M ${P[0]} L ${P[1]}`;
  let d=`M ${P[0][0]} ${P[0][1]} `;
  for(let i=0;i<P.length-1;i++){
    const p0=P[i-1]||P[i],p1=P[i],p2=P[i+1],p3=P[i+2]||p2;
    d+=`C ${p1[0]+(p2[0]-p0[0])/6} ${p1[1]+(p2[1]-p0[1])/6} ${p2[0]-(p3[0]-p1[0])/6} ${p2[1]-(p3[1]-p1[1])/6} ${p2[0]} ${p2[1]} `;
  }
  return d;
}
function renderFlow(){

    : `<rect width="${W}" height="${H}" fill="#f0efea"/>`;
  let zf=''; zones.forEach(z=>{const sh=z.shape||[];if(sh.length>=3)zf+=`<polygon points="${sh.map(p=>X(p[0])+','+Y(p[1])).join(' ')}" fill="${z.color}" fill-opacity=".16"/>`;});
  const defs=`<defs><marker id="aP" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 z" fill="var(--primary)"/></marker><marker id="aS" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 z" fill="var(--secondary)"/></marker></defs>`;
  let paths='';
  (f.evacuation||[]).forEach(l=>{const d=smooth(l);if(d)paths+=`<path d="${d}" fill="none" stroke="var(--evac)" stroke-width="3" stroke-dasharray="9 7" stroke-linecap="round"/>`;});
  (f.secondary||[]).forEach(l=>{const d=smooth(l);if(d)paths+=`<path d="${d}" fill="none" stroke="var(--secondary)" stroke-width="3.5" marker-end="url(#aS)" stroke-linecap="round" opacity=".9"/>`;});
  const pr=f.primary||[],dp=smooth(pr);
  if(dp)paths+=`<path id="flowMain" d="${dp}" fill="none" stroke="var(--primary)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#aP)"/>`;
  const routeEdit=(editMode&&curPage==='flow');

  if(routeEdit&&addMode&&dp){ paths+=`<path id="flowHit" d="${dp}" fill="none" stroke="transparent" stroke-width="22" style="cursor:copy"/>`; }
  let mk='';
  if(f.entrance)mk+=`<g><circle cx="${X(f.entrance[0])}" cy="${Y(f.entrance[1])}" r="11" fill="var(--evac)"/><text x="${X(f.entrance[0])}" y="${Y(f.entrance[1])+4}" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">入</text><text x="${X(f.entrance[0])}" y="${Y(f.entrance[1])-16}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--evac)">${esc(f.entrance_label||'入口')}</text></g>`;
  if(f.exit)mk+=`<g><circle cx="${X(f.exit[0])}" cy="${Y(f.exit[1])}" r="11" fill="var(--primary)"/><text x="${X(f.exit[0])}" y="${Y(f.exit[1])+4}" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">出</text><text x="${X(f.exit[0])}" y="${Y(f.exit[1])-16}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--primary)">${esc(f.exit_label||'出口')}</text></g>`;
  const svg=`<svg id="svgFlow" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${defs}${bg}${zf}${paths}${mk}</svg>`;
  const legend=`<div class="legendbar">
    <div class="legend-item"><span class="lineswatch" style="border-top:5px solid var(--primary)"></span>主参观动线</div>
    <div class="legend-item"><span class="lineswatch" style="border-top:3.5px solid var(--secondary)"></span>次动线 / 支线</div>
    <div class="legend-item"><span class="lineswatch" style="border-top:3px dashed var(--evac)"></span>疏散动线</div>
    <div class="legend-item"><span class="swatch" style="background:var(--evac);border-radius:50%;width:14px;height:14px"></span>入口</div>
    <div class="legend-item"><span class="swatch" style="background:var(--primary);border-radius:50%;width:14px;height:14px"></span>出口</div></div>`;

  const ioRow=`<div class="iorow">

  const note=`<div class="note"><b>设计说明：</b>${ce(DATA.flow_note||'主动线（红）自入口贯穿各展区至出口，单向顺滑不交叉；次动线（蓝）通往辅助区；疏散动线（绿虚线）指向安全出口。',['flow_note'])}</div>`;
  return `<div class="sheet" id="sheet-flow"><div class="titleblock"><div class="corner"><div class="zh-title">${ce(DATA.flow_title||'参观动线图',['flow_title'])}</div><div class="en-title">${ce(DATA.flow_subtitle||'Visitor Flow',['flow_subtitle'])}</div></div><div class="sheet-tag"><div class="big">参观动线</div><div class="small">VISITOR FLOW</div></div></div><div class="divider"></div>${modebar}<div class="stage">${svg}</div>${legend}${ioRow}${note}</div>`;

/* ---------- 图三：情绪曲线 ---------- */
function renderEmo(){
  const emo=DATA.emotion||[]; const w=1000,h=460,pL=70,pR=40,pT=50,pB=90;
  if(!emo.length) return `<div class="sheet" id="sheet-emo"><div class="note">未提供情绪数据</div></div>`;
  const n=emo.length,plotW=w-pL-pR,plotH=h-pT-pB;
  const cx=i=>pL+plotW*(n>1?i/(n-1):0.5), cy=v=>pT+plotH*(1-v/100);
  let bands='';const seg=plotW/n,pal=['#fdf2e9','#fae5d3','#f8d7b8','#f5c99e','#f2bb86','#efad6f'];
  for(let i=0;i<n;i++)bands+=`<rect x="${pL+i*seg}" y="${pT}" width="${seg}" height="${plotH}" fill="${pal[i%pal.length]}" opacity=".5"/>`;
  const P=emo.map((e,i)=>[cx(i),cy(e.value||50)]);
  let d=`M ${P[0][0]} ${P[0][1]} `;
  for(let i=0;i<P.length-1;i++){const p0=P[i-1]||P[i],p1=P[i],p2=P[i+1],p3=P[i+2]||p2;
    d+=`C ${p1[0]+(p2[0]-p0[0])/6} ${p1[1]+(p2[1]-p0[1])/6} ${p2[0]-(p3[0]-p1[0])/6} ${p2[1]-(p3[1]-p1[1])/6} ${p2[0]} ${p2[1]} `;}
  const axis=`<line x1="${pL}" y1="${pT+plotH}" x2="${w-pR}" y2="${pT+plotH}" stroke="#999" stroke-width="1.5"/><line x1="${pL}" y1="${pT}" x2="${pL}" y2="${pT+plotH}" stroke="#999" stroke-width="1.5"/><text x="${pL-10}" y="${pT+8}" text-anchor="end" font-size="11" fill="#999">情绪</text><text x="${pL-10}" y="${pT+plotH}" text-anchor="end" font-size="11" fill="#999">低</text>`;
  let dots='';emo.forEach((e,i)=>{const x=P[i][0],y=P[i][1];
    dots+=`<circle cx="${x}" cy="${y}" r="6" fill="#fff" stroke="var(--primary)" stroke-width="2.5"/>`
      +`<text x="${x}" y="${y-14}" text-anchor="middle" font-size="14" font-weight="700" fill="var(--primary)">${esc(e.word)}</text>`
      +`<text x="${x}" y="${pT+plotH+22}" text-anchor="middle" font-size="12" font-weight="600" fill="#444">${esc(e.zone)}</text>`
      +`<line x1="${x}" y1="${y}" x2="${x}" y2="${pT+plotH}" stroke="var(--primary)" stroke-width="1" stroke-dasharray="3 3" opacity=".4"/>`;});
  const svg=`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${bands}${axis}<path d="${d}" fill="none" stroke="var(--primary)" stroke-width="3.5" stroke-linecap="round"/>${dots}</svg>`;
  // 文字编辑：各点情绪词 + 区名（SVG文字不便直接编辑，用下方可编辑列表实时改）
  const editList=`<div class="emolist"><div class="subhead" style="margin-top:14px">情绪节点文字（可实时编辑）</div>`
    + emo.map((e,i)=>`<div class="emorow"><span class="enum">${i+1}</span>`
      + `<span class="elbl">区段</span>${ce(e.zone,['emotion',i,'zone'])}`
      + `<span class="elbl">情绪词</span>${ce(e.word,['emotion',i,'word'])}</div>`).join('')
    + `</div>`;
  const note=`<div class="note"><b>设计说明：</b>${ce(DATA.emotion_note||'按各展区内容重点设置互动、影像、装置、造景，引导观众情绪起伏，最终达到“意犹未尽”的观展体验。曲线呈波浪形、张弛有度。',['emotion_note'])}</div>`;
  return `<div class="sheet" id="sheet-emo"><div class="titleblock"><div class="corner"><div class="zh-title">${ce(DATA.emotion_title||'体验情绪节奏',['emotion_title'])}</div><div class="en-title">${ce(DATA.emotion_subtitle||'Experience Rhythm',['emotion_subtitle'])}</div></div><div class="sheet-tag"><div class="big">体验节奏</div><div class="small">EXPERIENCE RHYTHM</div></div></div><div class="divider"></div><div class="stage" style="background:#fff">${svg}</div>${editList}${note}</div>`;
}

/* ---------- 色块编辑交互 ---------- */
function svgPt(svg,evt){
  const pt=svg.createSVGPoint();pt.x=evt.clientX;pt.y=evt.clientY;
  const m=svg.getScreenCTM().inverse();const p=pt.matrixTransform(m);return [p.x,p.y];
}
function attachPlanEditing(){
  const svg=document.getElementById('svgPlan'); if(!svg) return;
  // 选中色块
  svg.querySelectorAll('.zpoly').forEach(poly=>{
    poly.addEventListener('click',e=>{
      if(!editMode) return;
      const zi=+poly.dataset.zi;
      if(addMode){ addVertexOnEdge(zi, svgPt(svg,e)); return; }
      selZone=DATA.zones[zi].id; renderAll();
    });
  });
  // 拖拽锚点
  let drag=null;
  svg.querySelectorAll('.vtx').forEach(v=>{
    v.addEventListener('mousedown',e=>{e.preventDefault();
      if(delMode){const zi=+v.dataset.zi,pi=+v.dataset.pi;const sh=DATA.zones[zi].shape;if(sh.length>3){sh.splice(pi,1);renderAll();}return;}
      drag={zi:+v.dataset.zi,pi:+v.dataset.pi};});
  });
  window.onmousemove=e=>{if(!drag)return;const [x,y]=svgPt(svg,e);DATA.zones[drag.zi].shape[drag.pi]=toPct(x,y);
    const v=svg.querySelector(`.vtx[data-zi="${drag.zi}"][data-pi="${drag.pi}"]`);
    const poly=svg.querySelector(`.zpoly[data-zi="${drag.zi}"]`);
    if(v){v.setAttribute('cx',x);v.setAttribute('cy',y);}
    if(poly){poly.setAttribute('points',DATA.zones[drag.zi].shape.map(p=>X(p[0])+','+Y(p[1])).join(' '));}};
  window.onmouseup=()=>{if(drag){drag=null;}};
}
function addVertexOnEdge(zi,xy){
  const sh=DATA.zones[zi].shape,[mx,my]=xy;let best=0,bd=1e9;
  for(let i=0;i<sh.length;i++){const a=[X(sh[i][0]),Y(sh[i][1])],b=[X(sh[(i+1)%sh.length][0]),Y(sh[(i+1)%sh.length][1])];
    const mid=[(a[0]+b[0])/2,(a[1]+b[1])/2];const dd=(mid[0]-mx)**2+(mid[1]-my)**2;if(dd<bd){bd=dd;best=i;}}
  sh.splice(best+1,0,toPct(mx,my));renderAll();
}

/* ---------- 动线路径编辑交互 ---------- */
function flowPathD(pr){ return smoothJS(pr); }
function smoothJS(points){
  if(points.length<2) return '';
  const P=points.map(p=>[X(p[0]),Y(p[1])]);
  if(P.length===2) return `M ${P[0][0]} ${P[0][1]} L ${P[1][0]} ${P[1][1]}`;
  let d=`M ${P[0][0]} ${P[0][1]} `;
  for(let i=0;i<P.length-1;i++){const p0=P[i-1]||P[i],p1=P[i],p2=P[i+1],p3=P[i+2]||p2;
    d+=`C ${p1[0]+(p2[0]-p0[0])/6} ${p1[1]+(p2[1]-p0[1])/6} ${p2[0]-(p3[0]-p1[0])/6} ${p2[1]-(p3[1]-p1[1])/6} ${p2[0]} ${p2[1]} `;}
  return d;
}
function attachFlowEditing(){
  const svg=document.getElementById('svgFlow'); if(!svg) return;
  let drag=null;
  svg.querySelectorAll('.rvtx').forEach(v=>{
    v.addEventListener('mousedown',e=>{
      e.preventDefault();
      if(delMode){ const pi=+v.dataset.pi; const pr=DATA.flow.primary; if(pr.length>2){pr.splice(pi,1);renderAll();} return; }
      drag={pi:+v.dataset.pi};
    });
  });
  // 加锚点：点击红色动线热区，在最近的线段中插入路径点
  const hit=svg.querySelector('#flowHit');
  if(hit){ hit.addEventListener('click',e=>{ if(!addMode)return; addFlowVertex(svgPt(svg,e)); }); }
  window.addEventListener('mousemove',e=>{if(!drag)return;const [x,y]=svgPt(svg,e);
    DATA.flow.primary[drag.pi]=toPct(x,y);
    const v=svg.querySelector(`.rvtx[data-pi="${drag.pi}"]`); if(v){v.setAttribute('cx',x);v.setAttribute('cy',y);}
    const path=svg.querySelector('#flowMain'); if(path){path.setAttribute('d',smoothJS(DATA.flow.primary));}});
  window.addEventListener('mouseup',()=>{if(drag){drag=null;}});
}
function addFlowVertex(xy){
  const pr=DATA.flow.primary,[mx,my]=xy; let best=0,bd=1e9;
  for(let i=0;i<pr.length-1;i++){
    const a=[X(pr[i][0]),Y(pr[i][1])],b=[X(pr[i+1][0]),Y(pr[i+1][1])];
    const mid=[(a[0]+b[0])/2,(a[1]+b[1])/2];const dd=(mid[0]-mx)**2+(mid[1]-my)**2;if(dd<bd){bd=dd;best=i;}
  }
  pr.splice(best+1,0,toPct(mx,my)); renderAll();
}

/* ---------- 按页切换的工具条 ---------- */
function renderToolbar(){
  const box=document.getElementById('ctxBtns'); const hint=document.getElementById('hint');
  let html='', h='文字双击即可改 · 保存后下次打开自动恢复';
  if(curPage==='plan'){
    html=`<button class="btn ${editMode?'primary':''}" onclick="toggleEdit()">✏️ 编辑色块</button>`
       +`<button class="btn ${addMode?'primary':''}" onclick="toggleAdd()">＋ 加锚点</button>`
       +`<button class="btn warn ${delMode?'primary':''}" onclick="toggleDel()">－ 删锚点</button>`
       +`<button class="btn" onclick="resetShapes()">↺ 还原色块</button>`;
    h='编辑色块：点选展区→拖锚点贴合房间 · 保存后下次自动恢复';
  }else if(curPage==='flow'){
    html=`<button class="btn ${editMode?'primary':''}" onclick="toggleEdit()">✏️ 编辑路线</button>`
       +`<button class="btn ${addMode?'primary':''}" onclick="toggleAdd()">＋ 加锚点</button>`
       +`<button class="btn warn ${delMode?'primary':''}" onclick="toggleDel()">－ 删锚点</button>`
       +`<button class="btn" onclick="resetFlow()">↺ 还原路线</button>`
       +`<button class="btn" onclick="saveState('路线已保存')">📌 保存路线</button>`;
    h='编辑路线：拖动路径点调整走向 · 加/删锚点增减拐点 · 底图随平面图实时同步';
  }else if(curPage==='emo'){
    html=`<button class="btn ${editMode?'primary':''}" onclick="toggleEdit()">✏️ 编辑文字</button>`
       +`<button class="btn" onclick="resetEmo()">↺ 还原文字</button>`;
    h='本页文字均可实时编辑：双击区段名/情绪词/标题/说明即可改';
  }else{
    html=`<span style="font-size:12.5px;color:#7a7a7a">本页所有文字双击即可编辑</span>`;
  }
  box.innerHTML=html; if(hint) hint.textContent=h;
}
function toggleEdit(){editMode=!editMode;if(!editMode){addMode=delMode=false;}renderAll();}
function toggleAdd(){if(!editMode){alert('请先开启“编辑”');return;}addMode=!addMode;delMode=false;renderAll();}
function toggleDel(){if(!editMode){alert('请先开启“编辑”');return;}delMode=!delMode;addMode=false;renderAll();}
function resetShapes(){if(confirm('还原全部色块到初始形状？')){DATA.zones.forEach((z,i)=>{z.shape=JSON.parse(JSON.stringify(orig[i].shape));});renderAll();}}
function resetFlow(){if(confirm('还原参观动线到初始路径？')){DATA.flow=JSON.parse(JSON.stringify(origFlow));renderAll();}}
function resetEmo(){if(confirm('还原本页文字到初始内容？')){location.reload();}}

/* ---------- 保存：写入 localStorage，下次打开自动恢复 ---------- */
function harvestEditable(){
  const seen={};
  document.querySelectorAll('#main [contenteditable][data-path]').forEach(el=>{
    const key=el.dataset.path; const val=el.innerText.trim();
    const p=JSON.parse(key); let o=DATA;
    for(let i=0;i<p.length-1;i++) o=o[p[i]];
    const cur=o[p[p.length-1]];
    // 同一路径多个镜像元素：优先采用与当前值不同（被改动）的那个
    if(seen[key]===undefined){ seen[key]=val; o[p[p.length-1]]=val; }
    else if(val!==cur && val!==seen[key]){ seen[key]=val; o[p[p.length-1]]=val; }
  });
}
function saveState(msg){
  try{
    harvestEditable();
    const out=JSON.parse(JSON.stringify(DATA)); delete out._bg_data_uri;
    localStorage.setItem(STORE_KEY, JSON.stringify(out));
    flash(msg||'已保存，下次打开将自动恢复');
  }catch(e){ alert('保存失败：'+e.message); }
}
function flash(t){
  let f=document.getElementById('flashmsg');
  if(!f){f=document.createElement('div');f.id='flashmsg';f.style.cssText='position:fixed;left:50%;top:14px;transform:translateX(-50%);background:#1f3a5f;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.2)';document.body.appendChild(f);}
  f.textContent='✓ '+t; f.style.opacity='1';
  clearTimeout(f._t); f._t=setTimeout(()=>{f.style.opacity='0';f.style.transition='opacity .5s';},1600);
}

document.getElementById('btnSaveState').onclick=()=>saveState();
document.getElementById('btnExport').onclick=function(){
  harvestEditable();
  const out=JSON.parse(JSON.stringify(DATA));delete out._bg_data_uri;
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='规划数据_已编辑.json';a.click();
};
document.getElementById('btnSaveHtml').onclick=function(){
  // 把当前 DATA 以最新状态固化进导出的 HTML，再次打开即为当前状态
  saveState('已保存当前状态');
  const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='展陈规划方案_已编辑.html';a.click();
};
